<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDR Team Dashboard – Q1 2026</title>
<style>
  :root {
    --bg:#f0f2f7;--bg2:#ffffff;--border:#e2e5ef;--border2:#c8cde0;
    --text:#1a1d2e;--text2:#6b7494;--text3:#a0a8c0;
    --blue:#4361ee;--blue-light:#eef0fd;
    --green:#0d9f6e;--green-light:#e6f7f2;
    --amber:#d97706;--amber-light:#fef3e2;
    --red:#dc2626;--red-light:#fef2f2;
    --purple:#7c3aed;--purple-light:#f3f0ff;
    --teal:#0891b2;--teal-light:#ecfeff;
    --radius:14px;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
    --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;}
  .page{max-width:1320px;margin:0 auto;padding:24px 20px;}
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
  .header h1{font-size:20px;font-weight:700;}
  .header-sub{font-size:12px;color:var(--text2);margin-top:3px;}
  .wd-status{font-size:11px;color:var(--text3);margin-top:3px;}
  .header-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .pill-group{display:flex;background:#fff;border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px;box-shadow:var(--shadow-sm);}
  .pill-btn{padding:5px 14px;border-radius:999px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .pill-btn.active{background:var(--blue);color:#fff;}
  .pill-btn:hover:not(.active){color:var(--text);background:var(--bg);}
  .team-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
  .team-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);}
  .tc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;}
  .tc-value{font-size:22px;font-weight:700;line-height:1;}
  .tc-target{font-size:11px;color:var(--text2);margin-top:4px;}
  .tc-badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;margin-top:8px;}
  .tc-badge.green{background:var(--green-light);color:var(--green);}
  .tc-badge.amber{background:var(--amber-light);color:var(--amber);}
  .tc-badge.red{background:var(--red-light);color:var(--red);}
  .tc-badge.blue{background:var(--blue-light);color:var(--blue);}
  .region-heading{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin:28px 0 14px;display:flex;align-items:center;gap:10px;}
  .region-heading::after{content:'';flex:1;height:1px;background:var(--border);}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .rep-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .rep-card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .rep-name{font-size:14px;font-weight:700;}
  .rep-tags{display:flex;gap:5px;margin-top:3px;}
  .role-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;}
  .tag-ob{background:var(--teal-light);color:var(--teal);}
  .tag-ib{background:var(--purple-light);color:var(--purple);}
  .tag-apac{background:var(--amber-light);color:var(--amber);}
  .tag-ramp{background:#f1f2f6;color:var(--text2);}
  .tag-hybrid{background:var(--blue-light);color:var(--blue);}
  .weighted-badge{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .wb-green{background:var(--green-light);color:var(--green);}
  .wb-amber{background:var(--amber-light);color:var(--amber);}
  .wb-red{background:var(--red-light);color:var(--red);}
  .wb-muted{background:#f1f2f6;color:var(--text3);}
  .rep-card-body{padding:12px 16px 14px;display:flex;flex-direction:column;gap:11px;}
  .metric-row{display:flex;flex-direction:column;gap:5px;}
  .metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:flex;align-items:center;justify-content:space-between;}
  .metric-pcts{display:flex;gap:14px;margin-top:2px;}
  .mpi-label{font-size:10px;color:var(--text3);}
  .mpi-val{font-size:12px;font-weight:700;}
  .mpi-val.green{color:var(--green);}.mpi-val.amber{color:var(--amber);}.mpi-val.red{color:var(--red);}.mpi-val.muted{color:var(--text2);}
  .bar-wrap{position:relative;height:6px;background:#eef0f5;border-radius:999px;overflow:visible;margin-top:3px;}
  .bar-fill{height:100%;border-radius:999px;}
  .bar-marker{position:absolute;top:-3px;width:2px;height:12px;background:var(--text2);border-radius:1px;opacity:.4;}
  .metric-divider{height:1px;background:var(--border);margin:1px 0;}
  .no-tgt-note{font-size:11px;color:var(--text3);margin-top:1px;}
  .inactive-note{font-size:11px;color:var(--text3);font-style:italic;padding:4px 0;}
  .legacy-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px 16px;margin-top:14px;}
  .legacy-box-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px;}
  .legacy-row-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);}
  .legacy-row-item:last-child{border-bottom:none;}
  .legacy-total-row{display:flex;justify-content:space-between;padding:6px 0 0;margin-top:4px;}
  .legacy-total-label{font-size:11px;font-weight:700;color:var(--text2);}
  .legacy-total-val{font-size:13px;font-weight:700;}
  @media(max-width:640px){.cards-grid{grid-template-columns:1fr;}.team-strip{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <h1>SDR Performance Dashboard</h1>
      <div class="header-sub">Q1 2026 · Updated <span id="lu-date"></span></div>
      <div class="wd-status" id="wd-status"></div>
    </div>
    <div class="header-controls">
      <div class="pill-group" id="month-pills">
        <button class="pill-btn" onclick="setMonth(0,this)">Jan</button>
        <button class="pill-btn" onclick="setMonth(1,this)">Feb</button>
        <button class="pill-btn active" onclick="setMonth(2,this)">Mar</button>
        <button class="pill-btn" onclick="setMonth(3,this)">Q1</button>
      </div>
      <div class="pill-group" id="region-pills">
        <button class="pill-btn active" onclick="setRegion('all',this)">All</button>
        <button class="pill-btn" onclick="setRegion('emea',this)">EMEA</button>
        <button class="pill-btn" onclick="setRegion('apac',this)">APAC</button>
      </div>
    </div>
  </div>
  <div id="team-strip"></div>
  <div id="cards-container"></div>
</div>

<script>
const G = 1.15;

const WD = {
  0:{total:22,days:[2,5,6,7,8,9,12,13,14,15,16,19,20,21,22,23,26,27,28,29,30]},
  1:{total:20,days:[2,3,4,5,6,9,10,11,12,13,16,17,18,19,20,23,24,25,26,27]},
  2:{total:22,days:[2,3,4,5,6,9,10,11,12,13,16,17,18,19,20,23,24,25,26,27,30,31]}
};
const WD_Q1_TOTAL = WD[0].total + WD[1].total + WD[2].total; // 22+20+22 = 64

// Team-level demo target adjustment per month (e.g. Majd's March target counted at team level only)
const TEAM_DEMO_ADJ = [0, 0, 15];

function wdFrac(m) {
  const t=new Date(), tm=t.getMonth(), td=t.getDate();
  if(tm>m) return 1;
  if(tm<m) return 0;
  return WD[m].days.filter(d=>d<=td).length / WD[m].total;
}

function wdFracQ1() {
  const today=new Date(), tm=today.getMonth(), td=today.getDate();
  if(tm>2) return 1;
  let passed=0;
  for(let m=0; m<Math.min(tm,3); m++) passed+=WD[m].total;
  if(tm<=2) passed+=WD[tm].days.filter(d=>d<=td).length;
  return passed / WD_Q1_TOTAL;
}

function wdPassedQ1() {
  const today=new Date(), tm=today.getMonth(), td=today.getDate();
  if(tm>2) return WD_Q1_TOTAL;
  let passed=0;
  for(let m=0; m<Math.min(tm,3); m++) passed+=WD[m].total;
  if(tm<=2) passed+=WD[tm].days.filter(d=>d<=td).length;
  return passed;
}

const REPS = [
  { id:'loic', name:'Loic', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['hybrid','inbound','inbound'],
    targets: [{demos:15,book:15000},{demos:null,book:15000},{demos:null,book:36000}],
    actuals: [{demos:9, book:20877},{demos:2,   book:36742},{demos:6,   book:86390}],
    pipe:    [{t:40051,a:87203},    {t:96122,a:300171},    {t:96122,a:785000}] },

  { id:'majd', name:'Majd', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['hybrid','hybrid','inbound'],
    targets: [{demos:15,book:15000},{demos:15,book:15000},{demos:null,book:15000}],
    actuals: [{demos:16,book:9878}, {demos:14,book:13995},{demos:0,   book:16304.40}],
    pipe:    [{t:107399,a:51742},   {t:107399,a:139072},  {t:107399,a:296000}] },

  { id:'yannis', name:'Yannis', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['hybrid','outbound','outbound'],
    targets: [{demos:15,book:15000},{demos:15,book:15000},{demos:15,book:8000}],
    actuals: [{demos:16,book:9142}, {demos:17,book:21173},{demos:15,book:9548.10}],
    pipe:    [{t:69917,a:87873},    {t:40000,a:100124},   {t:40000,a:43000}] },

  { id:'aissa', name:'Aissa', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['hybrid','outbound',null],
    targets: [{demos:15,book:15000},{demos:15,book:15000},null],
    actuals: [{demos:14,book:17412},{demos:10,book:21246},null],
    pipe:    [{t:69917,a:79883},    {t:40000,a:91855},    null] },

  { id:'viola', name:'Viola', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['ramp','ramp','outbound'],
    targets: [null,{demos:10,book:null},{demos:15,book:8000}],
    actuals: [{demos:3,book:null},  {demos:8,book:3600},  {demos:21,book:10836}],
    pipe:    [null,{t:40000,a:43154},{t:40000,a:80000}] },

  { id:'aron', name:'Aron', region:'EMEA', gbp:false, isLegacyQ1:true,
    types:   ['hybrid',null,null],
    targets: [{demos:18,book:17250},null,null],
    actuals: [{demos:12,book:9144}, null,null],
    pipe:    [null,null,null] },

  { id:'ece', name:'Ece', region:'EMEA', gbp:false, isLegacyQ1:true,
    types:   ['hybrid',null,null],
    targets: [{demos:18,book:17250},null,null],
    actuals: [{demos:11,book:20639},null,null],
    pipe:    [null,null,null] },

  { id:'isa', name:'Isa', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['ramp','ramp','ramp'],
    targets: [null,null,null],
    actuals: [{demos:0,book:0},{demos:0,book:0},{demos:0,book:0}],
    pipe:    [null,null,{t:null,a:8400}] },

  { id:'valeria', name:'Valeria', region:'EMEA', gbp:false, isLegacyQ1:false,
    types:   ['ramp','ramp','ramp'],
    targets: [null,null,null],
    actuals: [{demos:0,book:0},{demos:0,book:0},{demos:0,book:0}],
    pipe:    [null,null,{t:null,a:7200}] },

  { id:'khye', name:'Khye', region:'APAC', gbp:true, isLegacyQ1:false,
    types:   ['hybrid','hybrid','hybrid'],
    targets: [{demos:15,book:10000*G},{demos:15,book:10000*G},{demos:15,book:10000*G}],
    actuals: [{demos:14,book:6394*G}, {demos:16,book:4673*G}, {demos:16,book:11298.90*G}],
    pipe:    [{t:66708,a:63244},      {t:66708,a:42774},      {t:66708,a:137000*G}] },

  { id:'stanly', name:'Stanly', region:'APAC', gbp:true, isLegacyQ1:false,
    types:   ['hybrid','hybrid',null],
    targets: [{demos:15,book:10000*G},{demos:15,book:10000*G},null],
    actuals: [{demos:6, book:7283*G}, {demos:11,book:8783*G}, null],
    pipe:    [{t:76810,a:27552},      null,                   null] },

  { id:'ruzain', name:'Ruzain', region:'APAC', gbp:true, isLegacyQ1:false,
    types:   ['hybrid',null,null],
    targets: [{demos:15,book:10000*G},null,null],
    actuals: [{demos:9, book:3996*G}, null,null],
    pipe:    [{t:76188,a:61391},      null,null] },
];

const LEGACY = [
  { name:'Aron',     book:[null,  61425, 840],  q1extra:9144  },
  { name:'Ece',      book:[null,  null,  4560], q1extra:20369 },
  { name:'Bernardo', book:[3427,  7068,  null], q1extra:0     },
  { name:'Ilian',    book:[null,  null,  null], q1extra:0     },
];

let S = { month:2, region:'all' };

function fmtE(v, full=false) {
  if(v==null||v===0) return '–';
  if(full) return '€'+Math.round(v).toLocaleString('en-GB');
  if(v>=1e6) return '€'+(v/1e6).toFixed(1)+'M';
  if(v>=1000) return '€'+Math.round(v/1000)+'k';
  return '€'+Math.round(v);
}
function fmtG(v, full=false) {
  if(v==null||v===0) return '–';
  const g=v/G;
  if(full) return '£'+Math.round(g).toLocaleString('en-GB');
  if(g>=1000) return '£'+Math.round(g/1000)+'k';
  return '£'+Math.round(g);
}
function ach(a,t){ return(!t||a==null)?null:a/t; }
function pac(a,t,f){ return(!t||a==null||!f)?null:(a/t)/f; }
function pctStr(v){ return v==null?'–':Math.round(v*100)+'%'; }
function pCls(v){ return v==null?'muted':v>=1?'green':v>=.75?'amber':'red'; }
function bClr(v){ return v==null?'#eef0f5':v>=1?'#0d9f6e':v>=.75?'#d97706':'#dc2626'; }
function badgeCls(v){ return v==null?'blue':v>=1?'green':v>=.75?'amber':'red'; }

function typeTag(ty, region) {
  if(!ty||ty==='ramp') return '<span class="role-tag tag-ramp">Ramping</span>';
  if(region==='APAC')  return '<span class="role-tag tag-apac">APAC · Hybrid</span>';
  if(ty==='inbound')   return '<span class="role-tag tag-ib">Inbound</span>';
  if(ty==='outbound')  return '<span class="role-tag tag-ob">Outbound</span>';
  return '<span class="role-tag tag-hybrid">Hybrid</span>';
}

function weightedScore(rep, mIdx) {
  if(mIdx===3) {
    let dA=0,dT=0,bA=0,bT=0;
    for(let i=0;i<3;i++){
      const a=rep.actuals[i],t=rep.targets[i];
      if(a&&a.demos!=null)dA+=a.demos; if(t&&t.demos!=null)dT+=t.demos;
      if(a&&a.book!=null) bA+=a.book;  if(t&&t.book!=null) bT+=t.book;
    }
    const da=ach(dA,dT),ba=ach(bA,bT);
    if(!dT)return ba; if(!bT)return da;
    return (da||0)*.75+(ba||0)*.25;
  }
  const t=rep.targets[mIdx],a=rep.actuals[mIdx];
  if(!t||!a)return null;
  const ba=ach(a.book,t.book);
  const ty=rep.types[mIdx];
  if(ty==='inbound'||t.demos==null)return ba;
  const da=ach(a.demos,t.demos);
  if(da==null&&ba==null)return null;
  if(da==null)return ba; if(ba==null)return da;
  return da*.75+ba*.25;
}

function metricBlock(label, actual, targetVal, achV, pacV, wdf, fmtFn) {
  const fillW=Math.min((achV||0)*100,100);
  const pacMark=Math.min((wdf||0)*100,100);
  const isDemos=label==='Demos';
  const actualStr=isDemos?(actual!=null?String(actual):'0'):(fmtFn===fmtG?fmtG(actual,true):fmtE(actual,true));
  const targetStr=isDemos?(targetVal!=null?String(targetVal):'–'):(fmtFn===fmtG?fmtG(targetVal):fmtE(targetVal));
  return `<div class="metric-row">
    <div class="metric-label">${label}
      <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${actualStr} <span style="color:var(--text3)">/ ${targetStr}</span></span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" style="width:${fillW}%;background:${bClr(achV)}"></div>
      <div class="bar-marker" style="left:${pacMark}%"></div>
    </div>
    <div class="metric-pcts">
      <div><div class="mpi-label">Achievement</div><div class="mpi-val ${pCls(achV)}">${pctStr(achV)}</div></div>
      <div><div class="mpi-label">Pacing</div><div class="mpi-val ${pCls(pacV)}">${pctStr(pacV)}</div></div>
    </div>
  </div>`;
}

function demoNoTargetBlock(actual) {
  return `<div class="metric-row">
    <div class="metric-label">Demos <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">· no target</span></div>
    <div style="font-size:15px;font-weight:700;margin-top:2px">${actual!=null?actual:0}</div>
  </div>`;
}

function noTargetBlock(label) {
  return `<div class="metric-row">
    <div class="metric-label">${label}</div>
    <div class="no-tgt-note">No target for this month</div>
  </div>`;
}

function pipeBlock(p, wdf) {
  if(!p||!p.t) return noTargetBlock('Pipeline (CM)');
  const achV=ach(p.a,p.t),pacV=pac(p.a,p.t,wdf);
  const fillW=Math.min((achV||0)*100,100),pacMark=Math.min((wdf||0)*100,100);
  return `<div class="metric-row">
    <div class="metric-label">Pipeline (CM)
      <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${fmtE(p.a)} <span style="color:var(--text3)">/ ${fmtE(p.t)}</span></span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" style="width:${fillW}%;background:${bClr(achV)}"></div>
      <div class="bar-marker" style="left:${pacMark}%"></div>
    </div>
    <div class="metric-pcts">
      <div><div class="mpi-label">Achievement</div><div class="mpi-val ${pCls(achV)}">${pctStr(achV)}</div></div>
      <div><div class="mpi-label">Pacing</div><div class="mpi-val ${pCls(pacV)}">${pctStr(pacV)}</div></div>
    </div>
  </div>`;
}

function buildCard(rep, mIdx) {
  const isQ1=mIdx===3;
  const ty=isQ1?rep.types[2]||rep.types.find(t=>t&&t!=='ramp')||'hybrid':rep.types[mIdx];
  const fmtFn=rep.gbp?fmtG:fmtE;
  const ws=weightedScore(rep,mIdx);
  const wbCls=ws==null?'wb-muted':ws>=1?'wb-green':ws>=.75?'wb-amber':'wb-red';
  let body='';

  if(isQ1) {
    let dA=0,dT=0,bA=0,bT=0,pA=0,pT=0;
    for(let i=0;i<3;i++){
      const a=rep.actuals[i],t=rep.targets[i],p=rep.pipe[i];
      if(a&&a.demos!=null)dA+=a.demos; if(t&&t.demos!=null)dT+=t.demos;
      if(a&&a.book!=null) bA+=a.book;  if(t&&t.book!=null) bT+=t.book;
      if(p&&p.t){pT+=p.t;pA+=(p.a||0);}
    }
    const wdfQ1=wdFracQ1();
    const dAch=ach(dA,dT),bAch=ach(bA,bT);
    const dPac=pac(dA,dT,wdfQ1),bPac=pac(bA,bT,wdfQ1);
    if(dT>0) body+=metricBlock('Demos',dA,dT,dAch,dPac,wdfQ1,fmtE);
    else if(dA>0) body+=demoNoTargetBlock(dA);
    body+=`<div class="metric-divider"></div>`;
    if(bT>0) body+=metricBlock('Bookings',bA,bT,bAch,bPac,wdfQ1,fmtFn);
    else if(bA>0){
      const s=rep.gbp?fmtG(bA,true):fmtE(bA,true);
      body+=`<div class="metric-row"><div class="metric-label">Bookings <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">· no target</span></div><div style="font-size:15px;font-weight:700;margin-top:2px">${s}</div></div>`;
    }
    body+=`<div class="metric-divider"></div>`;
    if(pT>0){
      const pAch=ach(pA,pT),fillW=Math.min((pAch||0)*100,100);
      body+=`<div class="metric-row">
        <div class="metric-label">Pipeline (CQ)
          <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${fmtE(pA)} <span style="color:var(--text3)">/ ${fmtE(pT)}</span></span>
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${fillW}%;background:${bClr(pAch)}"></div></div>
        <div class="metric-pcts">
          <div><div class="mpi-label">Q1 Achievement</div><div class="mpi-val ${pCls(pAch)}">${pctStr(pAch)}</div></div>
        </div>
      </div>`;
    }
  } else {
    const t=rep.targets[mIdx],a=rep.actuals[mIdx],p=rep.pipe[mIdx];
    const wdf=wdFrac(mIdx);
    if(!a&&!t){
      body=`<div class="inactive-note">Not active this month</div>`;
    } else if(ty==='ramp'){
      const dT=t?t.demos:null,dA=(a&&a.demos!=null)?a.demos:0;
      const bT=t?t.book:null, bA=a?a.book:null;
      if(dT!=null) body+=metricBlock('Demos',dA,dT,ach(dA,dT),pac(dA,dT,wdf),wdf,fmtE);
      else body+=demoNoTargetBlock(dA);
      body+=`<div class="metric-divider"></div>`;
      if(bT!=null) body+=metricBlock('Bookings',bA,bT,ach(bA,bT),pac(bA,bT,wdf),wdf,fmtFn);
      else body+=noTargetBlock('Bookings');
      body+=`<div class="metric-divider"></div>`;
      body+=noTargetBlock('Pipeline (CM)');
    } else {
      const dT=t?t.demos:null,dA=(a&&a.demos!=null)?a.demos:0;
      const bT=t?t.book:null, bA=a?a.book:null;
      if(dT!=null) body+=metricBlock('Demos',dA,dT,ach(dA,dT),pac(dA,dT,wdf),wdf,fmtE);
      else body+=demoNoTargetBlock(dA);
      body+=`<div class="metric-divider"></div>`;
      if(bT!=null) body+=metricBlock('Bookings',bA,bT,ach(bA,bT),pac(bA,bT,wdf),wdf,fmtFn);
      else if(bA!=null&&bA>0){
        const s=rep.gbp?fmtG(bA,true):fmtE(bA,true);
        body+=`<div class="metric-row"><div class="metric-label">Bookings <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">· no target</span></div><div style="font-size:15px;font-weight:700;margin-top:2px">${s}</div></div>`;
      }
      body+=`<div class="metric-divider"></div>`;
      body+=pipeBlock(p,wdf);
    }
  }

  return `<div class="rep-card">
    <div class="rep-card-header">
      <div>
        <div class="rep-name">${rep.name}</div>
        <div class="rep-tags">${typeTag(ty,rep.region)}</div>
      </div>
      <div class="weighted-badge ${wbCls}">${ws!=null?Math.round(ws*100)+'%':'–'}</div>
    </div>
    <div class="rep-card-body">${body}</div>
  </div>`;
}

function buildLegacyBox(mIdx, region) {
  if(region==='apac') return '';
  const isQ1=mIdx===3;
  const rows=LEGACY.map(l=>{
    const val=isQ1
      ? l.book.reduce((s,v)=>s+(v||0),0)+(l.q1extra||0)
      : (l.book[mIdx]||0);
    return val>0?{name:l.name,val}:null;
  }).filter(Boolean);
  if(!rows.length) return '';
  const total=rows.reduce((s,r)=>s+r.val,0);
  return `<div class="legacy-box">
    <div class="legacy-box-title">Legacy SDR Bookings</div>
    ${rows.map(r=>`<div class="legacy-row-item">
      <span style="font-size:12px;color:var(--text2)">${r.name}</span>
      <span style="font-size:12px;font-weight:600">${fmtE(r.val,true)}</span>
    </div>`).join('')}
    <div class="legacy-total-row">
      <span class="legacy-total-label">${isQ1?'Q1 Total':'Total'}</span>
      <span class="legacy-total-val">${fmtE(total,true)}</span>
    </div>
  </div>`;
}

function buildTeamStrip(mIdx, region) {
  const regFilter=region==='all'?['EMEA','APAC']:[region.toUpperCase()];
  const range=mIdx===3?[0,1,2]:[mIdx];
  let dA=0,dT=0,bA=0,bT=0,pA=0,pT=0;
  for(const r of REPS.filter(rep=>regFilter.includes(rep.region))){
    for(const i of range){
      const ty=r.types[i]; if(!ty) continue;
      const a=r.actuals[i],t=r.targets[i],p=r.pipe[i];
      if(a&&a.demos!=null)dA+=a.demos;
      if(a&&a.book!=null) bA+=a.book;
      if(t&&t.demos!=null)dT+=t.demos;
      if(t&&t.book!=null) bT+=t.book;
      if(ty!=='ramp'&&p&&p.t){pT+=p.t;pA+=(p.a||0);}
    }
  }
  // Add team-level demo target adjustment (e.g. Majd's March target at team level)
  if(regFilter.includes('EMEA')){
    for(const i of range) dT+=TEAM_DEMO_ADJ[i]||0;
  }
  // Add legacy bookings for EMEA
  if(regFilter.includes('EMEA')){
    for(const l of LEGACY){
      for(const i of range){if(l.book[i])bA+=l.book[i];}
      if(mIdx===3)bA+=(l.q1extra||0);
    }
  }
  const dPct=ach(dA,dT),bPct=ach(bA,bT),pPct=ach(pA,pT);
  const ml=mIdx===3?'Q1':['Jan','Feb','Mar'][mIdx];
  const card=(label,val,tgt,pct,lg=false)=>`<div class="team-card">
    <div class="tc-label">${label} · ${ml}</div>
    <div class="tc-value" style="${lg?'font-size:18px':''}">${val}</div>
    <div class="tc-target">of ${tgt} target</div>
    ${pct!=null?`<span class="tc-badge ${badgeCls(pct)}">${Math.round(pct*100)}%</span>`:''}
  </div>`;
  return `<div class="team-strip">
    ${card('Demos',dA,dT||'–',dPct)}
    ${card('Bookings',fmtE(bA),fmtE(bT),bPct,true)}
    ${card('Pipeline',fmtE(pA),fmtE(pT),pPct,true)}
  </div>`;
}

function buildWdStatus() {
  const today=new Date(),tm=today.getMonth(),td=today.getDate();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March'];
  const sfx=td===1||td===21||td===31?'st':td===2||td===22?'nd':td===3||td===23?'rd':'th';
  const el=document.getElementById('wd-status');
  if(S.month===3){
    const passed=wdPassedQ1();
    const mLabel=tm<=2?months[tm]:'March';
    el.textContent=`As of ${days[today.getDay()]} ${mLabel} ${td}${sfx} we have completed ${passed} working days out of ${WD_Q1_TOTAL} in the quarter`;
  } else {
    if(tm<0||tm>2){el.textContent='';return;}
    const passed=WD[tm].days.filter(d=>d<=td).length;
    el.textContent=`As of ${days[today.getDay()]} ${months[tm]} ${td}${sfx} we have completed ${passed} working day${passed!==1?'s':''} out of ${WD[tm].total} in the month`;
  }
}

function render() {
  const {month:mIdx,region}=S;
  document.getElementById('team-strip').innerHTML=buildTeamStrip(mIdx,region);
  const regFilter=region==='all'?['EMEA','APAC']:[region.toUpperCase()];
  let html='';
  for(const reg of regFilter){
    const visible=REPS.filter(r=>{
      if(r.region!==reg)return false;
      if(r.isLegacyQ1&&mIdx===3)return false;
      if(mIdx===3)return r.types.some(t=>t&&t!=='ramp');
      const ty=r.types[mIdx];if(!ty)return false;
      if(ty==='ramp'){
        const a=r.actuals[mIdx],t=r.targets[mIdx];
        return(a&&(a.demos>0||(a.book!=null&&a.book>0)))||(t&&(t.demos!=null||t.book!=null));
      }
      return true;
    });
    if(!visible.length)continue;
    html+=`<div class="region-heading">${reg}</div><div class="cards-grid">`;
    for(const rep of visible)html+=buildCard(rep,mIdx);
    html+=`</div>`;
    html+=buildLegacyBox(mIdx,reg.toLowerCase());
  }
  document.getElementById('cards-container').innerHTML=html;
}

function setMonth(m,el){
  S.month=m;
  document.querySelectorAll('#month-pills .pill-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  buildWdStatus();
  render();
}
function setRegion(r,el){
  S.region=r;
  document.querySelectorAll('#region-pills .pill-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

document.getElementById('lu-date').textContent=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
buildWdStatus();
render();
</script>
