<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDR Performance Dashboard – 2026</title>
<style>
  :root {
    --bg:#FAF8F4;--bg2:#ffffff;--border:#EDE8DF;--border2:#D9D2C7;
    --text:#1E2B3A;--text2:#6B7060;--text3:#A8A39A;
    --blue:#F47C20;--blue-light:#FEF0E4;
    --green:#0d9f6e;--green-light:#e6f7f2;
    --amber:#d97706;--amber-light:#fef3e2;
    --red:#dc2626;--red-light:#fef2f2;
    --purple:#2B7B7B;--purple-light:#E6F4F4;
    --teal:#2B7B7B;--teal-light:#E6F4F4;
    --rose:#e11d48;--rose-light:#fff1f2;
    --lime:#65a30d;--lime-light:#f7fee7;
    --radius:14px;--shadow:0 1px 4px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
    --shadow-sm:0 1px 3px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;}
  .lh-topbar{background:#F47C20;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;}
  .lh-topbar-logo{height:26px;width:auto;display:block;}
  .lh-topbar-title{color:#fff;font-size:17px;font-weight:600;letter-spacing:-.01em;flex:1;text-align:center;}
  .lh-topbar-right{width:160px;}
  .page{max-width:1320px;margin:0 auto;padding:20px 20px;}
  .header{display:flex;flex-direction:column;margin-bottom:20px;gap:12px;}
  .header h1{font-size:19px;font-weight:600;letter-spacing:-.01em;}
  .header-sub{font-size:12px;color:var(--text2);margin-top:2px;}
  .wd-status{font-size:11px;color:var(--text3);margin-top:2px;}
  .header-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;justify-content:space-between;}
  .pill-group{display:flex;background:#fff;border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px;box-shadow:var(--shadow-sm);}
  .pill-btn{padding:5px 14px;border-radius:999px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
  .pill-btn.active{background:#F47C20;color:#fff;}
  .pill-btn:hover:not(.active){color:var(--text);background:var(--bg);}
  .team-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
  .team-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);}
  .tc-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;}
  .tc-value{font-size:22px;font-weight:700;line-height:1;}
  .tc-target{font-size:11px;color:var(--text2);margin-top:4px;}
  .tc-badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;margin-top:8px;}
  .tc-badge.green{background:var(--green-light);color:var(--green);}
  .tc-badge.amber{background:var(--amber-light);color:var(--amber);}
  .tc-badge.red{background:var(--red-light);color:var(--red);}
  .tc-badge.blue{background:#FEF0E4;color:#F47C20;}
  .region-heading{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#F47C20;margin:24px 0 12px;display:flex;align-items:center;gap:10px;}
  .region-heading::after{content:'';flex:1;height:1px;background:var(--border);}
  .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .rep-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .rep-card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .rep-name{font-size:14px;font-weight:600;letter-spacing:-.01em;}
  .rep-tags{display:flex;gap:5px;margin-top:3px;}
  .role-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;}
  .tag-ob{background:#E6F4F4;color:#2B7B7B;}
  .tag-ib{background:#FEF0E4;color:#C96210;}
  .tag-apac{background:#FEF0E4;color:#C96210;}
  .tag-amer{background:#fff1f2;color:#e11d48;}
  .tag-latam{background:#f7fee7;color:#65a30d;}
  .tag-ramp{background:#F5F2EE;color:var(--text2);}
  .tag-hybrid{background:#FEF0E4;color:#C96210;}
  .weighted-badge{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .wb-green{background:var(--green-light);color:var(--green);}
  .wb-amber{background:var(--amber-light);color:var(--amber);}
  .wb-red{background:var(--red-light);color:var(--red);}
  .wb-muted{background:#f1f2f6;color:var(--text3);}
  .rep-card-body{padding:12px 16px 14px;display:flex;flex-direction:column;gap:11px;}
  .metric-row{display:flex;flex-direction:column;gap:5px;}
  .metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:flex;align-items:center;justify-content:space-between;}
  .metric-pcts{display:flex;gap:14px;margin-top:2px;}
  .mpi-label{font-size:10px;color:var(--text3);}
  .mpi-val{font-size:12px;font-weight:700;}
  .mpi-val.green{color:var(--green);}.mpi-val.amber{color:var(--amber);}.mpi-val.red{color:var(--red);}.mpi-val.muted{color:var(--text2);}
  .bar-wrap{position:relative;height:6px;background:#eef0f5;border-radius:999px;overflow:visible;margin-top:3px;}
  .bar-fill{height:100%;border-radius:999px;}
  .bar-marker{position:absolute;top:-3px;width:2px;height:12px;background:var(--text2);border-radius:1px;opacity:.4;}
  .metric-divider{height:1px;background:var(--border);margin:1px 0;}
  .no-tgt-note{font-size:11px;color:var(--text3);margin-top:1px;}
  .inactive-note{font-size:11px;color:var(--text3);font-style:italic;padding:4px 0;}
  .legacy-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px 16px;margin-top:14px;}
  .legacy-box-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px;}
  .legacy-row-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);}
  .legacy-row-item:last-child{border-bottom:none;}
  .legacy-total-row{display:flex;justify-content:space-between;padding:6px 0 0;margin-top:4px;}
  .legacy-total-label{font-size:11px;font-weight:700;color:var(--text2);}
  .legacy-total-val{font-size:13px;font-weight:700;}
  .hist-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
  .hist-title{font-size:15px;font-weight:700;}
  .hist-sub{font-size:11px;color:var(--text3);margin-top:2px;}
  .hist-chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:20px 20px 16px;margin-bottom:16px;}
  .hist-chart-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
  .hist-legend{display:flex;gap:16px;font-size:11px;color:var(--text2);}
  .hist-legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
  .hist-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px;}
  .hist-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow-sm);}
  .hist-stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px;}
  .hist-stat-val{font-size:18px;font-weight:700;line-height:1;}
  .hist-stat-sub{font-size:11px;color:var(--text2);margin-top:3px;}
  .hist-note{font-size:11px;color:var(--text3);margin-top:4px;font-style:italic;}
  @media(max-width:640px){.cards-grid{grid-template-columns:1fr;}.team-strip{grid-template-columns:1fr;}}
</style>

function fmtE(v, full=false) {
  if(v==null||v===0) return '–';
  if(full) return '€'+Math.round(v).toLocaleString('en-GB');
  if(v>=1e6) return '€'+(v/1e6).toFixed(1)+'M';
  if(v>=1000) return '€'+Math.round(v/1000)+'k';
  return '€'+Math.round(v);
}
function fmtG(v, full=false) {
  if(v==null||v===0) return '–';
  const g=v/G;
  if(full) return '£'+Math.round(g).toLocaleString('en-GB');
  if(g>=1000) return '£'+Math.round(g/1000)+'k';
  return '£'+Math.round(g);
}
function fmtU(v, full=false) {
  if(v==null||v===0) return '–';
  if(full) return '$'+Math.round(v).toLocaleString('en-GB');
  if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M';
  if(v>=1000) return '$'+Math.round(v/1000)+'k';
  return '$'+Math.round(v);
}
function ach(a,t){ return(!t||a==null)?null:a/t; }
function pac(a,t,f){ return(!t||a==null||!f)?null:(a/t)/f; }
function pctStr(v){ return v==null?'–':Math.round(v*100)+'%'; }
function pCls(v){ return v==null?'muted':v>=1?'green':v>=.75?'amber':'red'; }
function bClr(v){ return v==null?'#eef0f5':v>=1?'#0d9f6e':v>=.75?'#d97706':'#dc2626'; }
function badgeCls(v){ return v==null?'blue':v>=1?'green':v>=.75?'amber':'red'; }

function typeTag(ty, region) {
  if(!ty||ty==='ramp') return '<span class="role-tag tag-ramp">Ramping</span>';
  if(region==='AMER')  return '<span class="role-tag tag-amer">AMER · Hybrid</span>';
  if(region==='LATAM') return '<span class="role-tag tag-latam">LATAM · Hybrid</span>';
  if(region==='APAC')  return '<span class="role-tag tag-apac">APAC · Hybrid</span>';
  if(ty==='inbound')   return '<span class="role-tag tag-ib">Inbound</span>';
  if(ty==='outbound')  return '<span class="role-tag tag-ob">Outbound</span>';
  return '<span class="role-tag tag-hybrid">Hybrid</span>';
}

function weightedScore(rep, mIdx) {
  if(mIdx===3) {
    let dA=0,dT=0,bA=0,bT=0;
    for(let i=0;i<3;i++){
      const a=rep.actuals[i],t=rep.targets[i];
      if(a&&a.demos!=null)dA+=a.demos; if(t&&t.demos!=null)dT+=t.demos;
      if(a&&a.book!=null) bA+=a.book;  if(t&&t.book!=null) bT+=t.book;
    }
    const da=ach(dA,dT),ba=ach(bA,bT);
    if(!dT)return ba; if(!bT)return da;
    return (da||0)*.75+(ba||0)*.25;
  }
  const t=rep.targets[mIdx],a=rep.actuals[mIdx];
  if(!t||!a)return null;
  const ba=ach(a.book,t.book);
  const ty=rep.types[mIdx];
  if(ty==='inbound'||t.demos==null)return ba;
  const da=ach(a.demos,t.demos);
  if(da==null&&ba==null)return null;
  if(da==null)return ba; if(ba==null)return da;
  return da*.75+ba*.25;
}

function metricBlock(label, actual, targetVal, achV, pacV, wdf, fmtFn) {
  const fillW=Math.min((achV||0)*100,100);
  const pacMark=Math.min((wdf||0)*100,100);
  const isDemos=label==='Demos';
  const actualStr=isDemos?(actual!=null?String(actual):'0'):(fmtFn===fmtG?fmtG(actual,true):fmtFn===fmtU?fmtU(actual,true):fmtE(actual,true));
  const targetStr=isDemos?(targetVal!=null?String(targetVal):'–'):(fmtFn===fmtG?fmtG(targetVal):fmtFn===fmtU?fmtU(targetVal):fmtE(targetVal));
  return `<div class="metric-row">
    <div class="metric-label">${label}
      <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${actualStr} <span style="color:var(--text3)">/ ${targetStr}</span></span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" style="width:${fillW}%;background:${bClr(achV)}"></div>
      <div class="bar-marker" style="left:${pacMark}%"></div>
    </div>
    <div class="metric-pcts">
      <div><div class="mpi-label">Achievement</div><div class="mpi-val ${pCls(achV)}">${pctStr(achV)}</div></div>
      <div><div class="mpi-label">Pacing</div><div class="mpi-val ${pCls(pacV)}">${pctStr(pacV)}</div></div>
    </div>
  </div>`;
}

function demoNoTargetBlock(actual) {
  return `<div class="metric-row">
    <div class="metric-label">Demos <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">· no target</span></div>
    <div style="font-size:15px;font-weight:700;margin-top:2px">${actual!=null?actual:0}</div>
  </div>`;
}

function noTargetBlock(label) {
  return `<div class="metric-row">
    <div class="metric-label">${label}</div>
    <div class="no-tgt-note">No target for this month</div>
  </div>`;
}

function pipeBlock(p, wdf, fmtFn) {
  fmtFn = fmtFn || fmtE;
  if (!p) return noTargetBlock('Pipeline (CM)');
  if (!p.t) {
    if (p.a) {
      return `<div class="metric-row">
        <div class="metric-label">Pipeline (CM)
          <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${fmtFn(p.a)} <span style="color:var(--text3)">· No target</span></span>
        </div>
      </div>`;
    }
    return noTargetBlock('Pipeline (CM)');
  }
  const achV=ach(p.a,p.t),pacV=pac(p.a,p.t,wdf);
  const fillW=Math.min((achV||0)*100,100),pacMark=Math.min((wdf||0)*100,100);
  return `<div class="metric-row">
    <div class="metric-label">Pipeline (CM)
      <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${fmtFn(p.a)} <span style="color:var(--text3)">/ ${fmtFn(p.t)}</span></span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" style="width:${fillW}%;background:${bClr(achV)}"></div>
      <div class="bar-marker" style="left:${pacMark}%"></div>
    </div>
    <div class="metric-pcts">
      <div><div class="mpi-label">Achievement</div><div class="mpi-val ${pCls(achV)}">${pctStr(achV)}</div></div>
      <div><div class="mpi-label">Pacing</div><div class="mpi-val ${pCls(pacV)}">${pctStr(pacV)}</div></div>
    </div>
  </div>`;
}

function buildCard(rep, mIdx) {
  const isQ1=mIdx===3;
  const ty=isQ1?rep.types[2]||rep.types.find(t=>t&&t!=='ramp')||'hybrid':rep.types[mIdx];
  const fmtFn=rep.gbp?fmtG:rep.usd?fmtU:fmtE;
  const ws=weightedScore(rep,mIdx);
  const wbCls=ws==null?'wb-muted':ws>=1?'wb-green':ws>=.75?'wb-amber':'wb-red';
  let body='';

  if(isQ1) {
    let dA=0,dT=0,bA=0,bT=0,pA=0,pT=0,pAnt=0;
    for(let i=0;i<3;i++){
      const a=rep.actuals[i],t=rep.targets[i],p=rep.pipe[i];
      if(a&&a.demos!=null)dA+=a.demos; if(t&&t.demos!=null)dT+=t.demos;
      if(a&&a.book!=null) bA+=a.book;  if(t&&t.book!=null) bT+=t.book;
      if(p&&p.t){pT+=p.t;pA+=(p.a||0);}
      else if(p&&p.a) pAnt+=(p.a||0);
    }
    const wdfQ1=wdFracQ();
    const dAch=ach(dA,dT),bAch=ach(bA,bT);
    const dPac=pac(dA,dT,wdfQ1),bPac=pac(bA,bT,wdfQ1);
    if(dT>0) body+=metricBlock('Demos',dA,dT,dAch,dPac,wdfQ1,fmtE);
    else if(dA>0) body+=demoNoTargetBlock(dA);
    body+=`<div class="metric-divider"></div>`;
    if(bT>0) body+=metricBlock('Bookings',bA,bT,bAch,bPac,wdfQ1,fmtFn);
    else if(bA>0){
      const s=rep.gbp?fmtG(bA,true):rep.usd?fmtU(bA,true):fmtE(bA,true);
      body+=`<div class="metric-row"><div class="metric-label">Bookings <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">· no target</span></div><div style="font-size:15px;font-weight:700;margin-top:2px">${s}</div></div>`;
    }
    body+=`<div class="metric-divider"></div>`;
    if(pT>0){
      const pAch=ach(pA,pT),fillW=Math.min((pAch||0)*100,100);
      body+=`<div class="metric-row">
        <div class="metric-label">Pipeline (CQ)
          <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${fmtFn(pA)} <span style="color:var(--text3)">/ ${fmtFn(pT)}</span></span>
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${fillW}%;background:${bClr(pAch)}"></div></div>
        <div class="metric-pcts">
          <div><div class="mpi-label">${QUARTER_LABEL} Achievement</div><div class="mpi-val ${pCls(pAch)}">${pctStr(pAch)}</div></div>
        </div>
      </div>`;
    } else if(pAnt>0){
      body+=`<div class="metric-row">
        <div class="metric-label">Pipeline (CQ)
          <span style="color:var(--text2);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${fmtFn(pAnt)} <span style="color:var(--text3)">· No target</span></span>
        </div>
      </div>`;
    }
  } else {
    const t=rep.targets[mIdx],a=rep.actuals[mIdx],p=rep.pipe[mIdx];
    const wdf=wdFrac(mIdx);
    if(!a&&!t){
      body=`<div class="inactive-note">Not active this month</div>`;
    } else if(ty==='ramp'){
      const dT=t?t.demos:null,dA=(a&&a.demos!=null)?a.demos:0;
      const bT=t?t.book:null, bA=a?a.book:null;
      if(dT!=null) body+=metricBlock('Demos',dA,dT,ach(dA,dT),pac(dA,dT,wdf),wdf,fmtE);
      else body+=demoNoTargetBlock(dA);
      body+=`<div class="metric-divider"></div>`;
      if(bT!=null) body+=metricBlock('Bookings',bA,bT,ach(bA,bT),pac(bA,bT,wdf),wdf,fmtFn);
      else body+=noTargetBlock('Bookings');
      body+=`<div class="metric-divider"></div>`;
      body+=noTargetBlock('Pipeline (CM)');
    } else {
      const dT=t?t.demos:null,dA=(a&&a.demos!=null)?a.demos:0;
      const bT=t?t.book:null, bA=a?a.book:null;
      if(dT!=null) body+=metricBlock('Demos',dA,dT,ach(dA,dT),pac(dA,dT,wdf),wdf,fmtE);
      else body+=demoNoTargetBlock(dA);
      body+=`<div class="metric-divider"></div>`;
      if(bT!=null) body+=metricBlock('Bookings',bA,bT,ach(bA,bT),pac(bA,bT,wdf),wdf,fmtFn);
      else if(bA!=null&&bA>0){
        const s=rep.gbp?fmtG(bA,true):rep.usd?fmtU(bA,true):fmtE(bA,true);
        body+=`<div class="metric-row"><div class="metric-label">Bookings <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">· no target</span></div><div style="font-size:15px;font-weight:700;margin-top:2px">${s}</div></div>`;
      }
      body+=`<div class="metric-divider"></div>`;
      body+=pipeBlock(p,wdf,fmtFn);
    }
  }

  return `<div class="rep-card">
    <div class="rep-card-header">
      <div>

function buildTeamStrip(mIdx, regFilter) {
  const useUSD=regFilter.some(r=>['AMER','LATAM'].includes(r));
  const range=mIdx===3?[0,1,2]:[mIdx];
  let dA=0,dT=0,bA=0,bT=0,pA=0,pT=0,pAnt=0;
  for(const r of REPS.filter(rep=>regFilter.includes(rep.region))){
    for(const i of range){
      const ty=r.types[i]; if(!ty) continue;
      const a=r.actuals[i],t=r.targets[i],p=r.pipe[i];
      const mult=useUSD?(r.usd?1:EUR_USD):1;
      if(a&&a.demos!=null)dA+=a.demos;
      if(a&&a.book!=null) bA+=a.book*mult;
      if(t&&t.demos!=null)dT+=t.demos;
      if(t&&t.book!=null) bT+=t.book*mult;
      if(ty!=='ramp'&&p&&p.t){pT+=p.t*mult;pA+=(p.a||0)*mult;}
      else if(ty!=='ramp'&&p&&p.a) pAnt+=(p.a||0)*mult;
    }
  }
  if(regFilter.includes('EMEA')){
    for(const i of range) dT+=TEAM_DEMO_ADJ[i]||0;
  }
  const emult=useUSD?EUR_USD:1;
  const umult=useUSD?1:(1/EUR_USD);
  if(regFilter.includes('EMEA')){
    for(const l of LEGACY){
      for(const i of range){if(l.book[i])bA+=l.book[i]*emult;}
      if(mIdx===3)bA+=(l.q1extra||0)*emult;
    }
  }
  if(regFilter.includes('AMER')){
    for(const l of LEGACY_AMER){
      for(const i of range){if(l.book[i])bA+=l.book[i]*umult;}
      if(mIdx===3)bA+=(l.q1extra||0)*umult;
    }
  }
  if(regFilter.includes('LATAM')){
    for(const l of LEGACY_LATAM){
      for(const i of range){if(l.book[i])bA+=l.book[i]*umult;}
      if(mIdx===3)bA+=(l.q1extra||0)*umult;
    }
  }
  // Manager pipeline contributions (stored in region's native currency)
  for(const [mgReg,mpArr] of Object.entries(MANAGER_PIPE)){
    if(!regFilter.includes(mgReg)) continue;
    for(const i of range){const mp=mpArr[i];if(mp)pAnt+=mp;}
  }
  const pTotalA=pA+pAnt;
  const dPct=ach(dA,dT),bPct=ach(bA,bT),pPct=pT>0?ach(pA,pT):null;
  const ml=mIdx===3?QUARTER_LABEL:QUARTER_MONTHS[mIdx];
  const fmt=useUSD?fmtU:fmtE;
  const card=(label,val,tgt,pct,lg=false)=>`<div class="team-card">
    <div class="tc-label">${label} · ${ml}</div>
    <div class="tc-value" style="${lg?'font-size:18px':''}">${val}</div>
    <div class="tc-target">of ${tgt} target</div>
    ${pct!=null?`<span class="tc-badge ${badgeCls(pct)}">${Math.round(pct*100)}%</span>`:''}
  </div>`;
  const pipeCard=`<div class="team-card">
    <div class="tc-label">Pipeline · ${ml}</div>
    <div class="tc-value" style="font-size:18px">${fmt(pTotalA)}</div>
    ${pT>0
      ? `<div class="tc-target">of ${fmt(pT)} target <span style="color:var(--text3);font-size:10px">(EMEA+APAC)</span></div>
         <span class="tc-badge ${badgeCls(pPct)}">${Math.round(pPct*100)}%</span>`
      : `<div class="tc-target" style="color:var(--text3)">No target</div>`
    }
  </div>`;
  return `<div class="team-strip">
    ${card('Demos',dA,dT||'–',dPct)}
    ${card('Bookings',fmt(bA),fmt(bT),bPct,true)}
    ${pipeCard}
  </div>`;
}

function buildWdStatus() {
  const today=new Date(),tm=today.getMonth(),td=today.getDate();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const qMonths=['April','May','June'];
  const sfx=td===1||td===21||td===31?'st':td===2||td===22?'nd':td===3||td===23?'rd':'th';
  const el=document.getElementById('wd-status');
  if(S.month===3){
    const passed=wdPassedQ();
    const relM=tm-QUARTER_START_MONTH;
    const mLabel=relM>=0&&relM<=2?qMonths[relM]:'June';
    el.textContent=`As of ${days[today.getDay()]} ${mLabel} ${td}${sfx} we have completed ${passed} working days out of ${WD_Q_TOTAL} in the quarter`;
  } else {
    const relM=tm-QUARTER_START_MONTH;
    if(relM<0||relM>2){el.textContent='';return;}
    const m=relM;
    const passed=WD[m].days.filter(d=>d<=td).length;
    el.textContent=`As of ${days[today.getDay()]} ${qMonths[m]} ${td}${sfx} we have completed ${passed} working day${passed!==1?'s':''} out of ${WD[m].total} in the month`;
  }
}

function setView(v, el) {
  VIEW = v;
  document.querySelectorAll('#view-pills .pill-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const isHistory = v === 'history';
  document.getElementById('quarter-pills').style.visibility = isHistory ? 'hidden' : '';
  document.getElementById('month-pills').style.display = isHistory ? 'none' : '';
  document.getElementById('region-pills').style.display = isHistory ? 'none' : '';
  document.getElementById('team-strip').style.display = isHistory ? 'none' : '';
  document.getElementById('cards-container').style.display = isHistory ? 'none' : '';
  document.getElementById('history-container').style.display = isHistory ? '' : 'none';
  if(isHistory) renderHistory();
}

function updateMonthPills() {
  const c = document.getElementById('month-pills');
  if (!c) return;
  c.innerHTML = QUARTER_MONTHS.map((m, i) =>
    `<button class="pill-btn${S.month===i?' active':''}" onclick="setMonth(${i},this)">${m}</button>`
  ).join('') + `<button class="pill-btn${S.month===3?' active':''}" onclick="setMonth(3,this)">${QUARTER_LABEL}</button>`;
}

function setQuarter(q, el) {
  ACTIVE_QUARTER = q;
  if (q === 1) {
    WD = Q1_WD; WD_Q_TOTAL = Q1_WD_TOTAL; TEAM_DEMO_ADJ = Q1_DEMO_ADJ;
    QUARTER_START_MONTH = Q1_QSM; QUARTER_MONTHS = Q1_MONTHS_DISP; QUARTER_LABEL = 'Q1';
    REPS = Q1_REPS; LEGACY = Q1_LEGACY; LEGACY_AMER = Q1_LEGACY_AMER;
    LEGACY_LATAM = Q1_LEGACY_LATAM; MANAGER_PIPE = Q1_MANAGER_PIPE;
    S.month = 3; // default to Q1 aggregate for closed quarter
  } else {
    WD = Q2_WD; WD_Q_TOTAL = Q2_WD_TOTAL; TEAM_DEMO_ADJ = Q2_DEMO_ADJ;
    QUARTER_START_MONTH = Q2_QSM; QUARTER_MONTHS = Q2_MONTHS_DISP; QUARTER_LABEL = 'Q2';
    REPS = Q2_REPS; LEGACY = Q2_LEGACY; LEGACY_AMER = Q2_LEGACY_AMER;
    LEGACY_LATAM = Q2_LEGACY_LATAM; MANAGER_PIPE = Q2_MANAGER_PIPE;
    S.month = 0; // default to April
  }
  document.querySelectorAll('#quarter-pills .pill-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  const ql = document.getElementById('qtr-label');
  if (ql) ql.textContent = QUARTER_LABEL + ' 2026';
  updateMonthPills();
  buildWdStatus();
  render();
}

// ── Historical filter state ────────────────────────────────────────────────
let histMetric    = 'pipeline'; // pipeline | bookings
let histRegion    = 'all';      // all | AMER | APAC | EMEA | LATAM
let histSource    = 'all';      // all | ib | ob
let histDateMode  = 'all';      // all | 2024 | 2025 | 2026 | custom
let histDateStart = 0;
let histDateEnd   = 26;
let histView      = 'total';    // total | perrep
let histShowAvg   = true;       // running average line visible
let histShowVals  = false;      // data labels on bars
let histGroupTime   = 'month';  // month | quarter | year
let histGroupRegion = false;    // false = total bar | true = split 4 bars by region
let histChart     = null;

const HIST_ALL_MONTHS = [
  "Jan'24","Feb'24","Mar'24","Apr'24","May'24","Jun'24",
  "Jul'24","Aug'24","Sep'24","Oct'24","Nov'24","Dec'24",
  "Jan'25","Feb'25","Mar'25","Apr'25","May'25","Jun'25",
  "Jul'25","Aug'25","Sep'25","Oct'25","Nov'25","Dec'25",
  "Jan'26","Feb'26","Mar'26"
];

function getRawHistVal(d) {
  const r = histRegion, s = histSource;
  if (r === 'all') { return s === 'all' ? d.total : (d[s] || 0); }
  return s === 'all' ? (d[r] || 0) : (d[r + '_' + s] || 0);
}

// Returns the correct headcount denominator for Per SDR, respecting region+source filters.
// Falls back to total `r` for pre-Q1 months where granular fields are not yet present.
function getHeadcount(d) {
  const r = histRegion, s = histSource;
  if (r !== 'all' && s !== 'all') {
    const specific = d['r_' + r + '_' + s];
    if (specific != null) return specific;
    const regional = d['r_' + r];
    if (regional != null) return regional;
  } else if (r !== 'all') {
    const regional = d['r_' + r];
    if (regional != null) return regional;
  } else if (s !== 'all') {
    const sourced = d['r_' + s];
    if (sourced != null) return sourced;
  }
  return d.r;
}

function getHistVal(d) {
  const raw = getRawHistVal(d);
  const hc  = getHeadcount(d);
  return histView === 'perrep' ? (hc > 0 ? Math.round(raw / hc) : 0) : raw;
}

function getHistData(rawData) {
  let s = 0, e = rawData.length - 1;
  if      (histDateMode === '2024')   { s = 0;  e = Math.min(11, e); }
  else if (histDateMode === '2025')   { s = 12; e = Math.min(23, e); }
  else if (histDateMode === '2026')   { s = 24; }
  else if (histDateMode === 'custom') { s = histDateStart; e = Math.min(histDateEnd, rawData.length - 1); }
  return rawData.slice(s, e + 1);
}

function fmtHistVal(v) {
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1000) return '$' + Math.round(v/1000) + 'k';
  return '$' + Math.round(v);
}

// ── Region colours for split mode ────────────────────────────────────────
const HIST_REGIONS = ['EMEA','APAC','AMER','LATAM'];
const HIST_REG_COLORS = {
  EMEA:  { bg:'rgba(244,124,32,0.22)',  border:'rgba(244,124,32,0.85)'  },
  APAC:  { bg:'rgba(43,123,123,0.22)', border:'rgba(43,123,123,0.85)'  },
  AMER:  { bg:'rgba(225,29,72,0.22)',   border:'rgba(225,29,72,0.85)'   },
  LATAM: { bg:'rgba(101,163,13,0.22)',  border:'rgba(101,163,13,0.85)'  },
};

// Aggregate monthly HIST data into quarters or years for the chart
function groupHistData(data) {
  if (histGroupTime === 'month') return data;
  const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const SUM_FIELDS = ['total','EMEA','APAC','AMER','LATAM','ib','ob',
    'EMEA_ib','EMEA_ob','APAC_ib','APAC_ob','AMER_ib','AMER_ob','LATAM_ib','LATAM_ob'];
  const AVG_FIELDS = ['r','r_EMEA','r_APAC','r_AMER','r_LATAM',
    'r_ib','r_ob','r_EMEA_ib','r_EMEA_ob','r_APAC_ib','r_APAC_ob',
    'r_AMER_ib','r_AMER_ob','r_LATAM_ib','r_LATAM_ob'];
  const groups = {}, order = [];
  data.forEach(d => {
    const mn = d.m.slice(0,3), yr = d.m.slice(4);
    const mi = MO.indexOf(mn);
    const key = histGroupTime === 'quarter'
      ? 'Q' + (Math.floor(mi / 3) + 1) + "'" + yr
      : '20' + yr;
    if (!groups[key]) {
      const g = { m: key, _n: 0 };
      SUM_FIELDS.forEach(k => g[k] = 0);
      AVG_FIELDS.forEach(k => g[k] = 0);
      groups[key] = g; order.push(key);
    }
    const g = groups[key];
    SUM_FIELDS.forEach(k => { g[k] += (d[k] || 0); });
    AVG_FIELDS.forEach(k => { g[k] += (d[k] || 0); });
    g._n++;
  });
  order.forEach(k => {
    const g = groups[k];
    AVG_FIELDS.forEach(fk => { g[fk] = Math.round(g[fk] / g._n); });
  });
  return order.map(k => groups[k]);
}

// Value for a single region from a (possibly grouped) data point
function getRegionHistVal(d, region) {
  const s = histSource;
  const raw = s === 'all' ? (d[region] || 0) : (d[region + '_' + s] || 0);
  if (histView === 'perrep') {
    const hc = d['r_' + region] || 1;
    return hc > 0 ? Math.round(raw / hc) : 0;
  }
  return raw;
}

function renderHistChart() {
  const rawData = histMetric === 'bookings' ? HIST_BOOK : HIST_PIPE;
  const data    = groupHistData(getHistData(rawData));
  const labels  = data.map(d => d.m);
  const isPR    = histView === 'perrep';
  const yLabel  = isPR ? 'USD per SDR' : 'USD';

  // Update chart section label to reflect current grouping
  const chartLabelEl = document.getElementById('hist-chart-title-label');
  if (chartLabelEl) {
    chartLabelEl.textContent =
      histGroupTime === 'quarter' ? 'Quarterly trend' :
      histGroupTime === 'year'    ? 'Annual trend'    : 'Monthly trend';
  }

  let datasets = [];

  if (histGroupRegion) {
    // ── REGION SPLIT MODE: 4 grouped bars (EMEA / APAC / AMER / LATAM) ───
    HIST_REGIONS.forEach((reg, idx) => {
      const vals = data.map(d => getRegionHistVal(d, reg));
      const c = HIST_REG_COLORS[reg];
      datasets.push({
        type: 'bar',
        label: reg,
        data: vals,
        backgroundColor: c.bg,
        borderColor: c.border,
        borderWidth: 1.5,
        borderRadius: 3,
        order: idx + 2,
      });
    });
  } else {
    // ── TOTAL MODE: single bar (original behaviour) ───────────────────────
    const vals     = data.map(d => getHistVal(d));
    const barColor = isPR ? 'rgba(124,58,237,0.18)' : 'rgba(67,97,238,0.18)';
    const barBorder= isPR ? 'rgba(124,58,237,0.7)'  : 'rgba(67,97,238,0.7)';
    const lblColor = isPR ? 'rgba(124,58,237,0.85)' : 'rgba(67,97,238,0.85)';
    datasets.push({
      type: 'bar',
      label: isPR ? 'Per SDR (USD)' : 'Total (USD)',
      data: vals,
      backgroundColor: barColor,
      borderColor: barBorder,
      borderWidth: 1.5,
      borderRadius: 4,
      order: 2,
    });
    // Running average line (only in total mode — meaningless across 4 regions)
    if (histShowAvg) {
      let cumSum = 0;
      const runningAvg = vals.map((v, i) => { cumSum += v; return Math.round(cumSum / (i + 1)); });
      datasets.push({
        type: 'line',
        label: 'Running Avg',
        data: runningAvg,
        borderColor: '#0d9f6e',
        backgroundColor: 'rgba(13,159,110,0.08)',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        tension: 0.35,
        fill: false,
        order: 1,
      });
    }
  }

  // Inline plugin: draw value labels on top of bars
  const barLabelsPlugin = {
    id: 'barLabels',
    afterDatasetsDraw(chart) {
      if (!histShowVals) return;
      const {ctx: c, data: cd} = chart;
      if (histGroupRegion) {
        // Draw a compact label above each region bar
        HIST_REGIONS.forEach((reg, dsIdx) => {
          const meta = chart.getDatasetMeta(dsIdx);
          if (!meta || !meta.data) return;
          const col = HIST_REG_COLORS[reg].border;
          c.save();
          c.font = '600 8px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
          c.textAlign = 'center';
          c.textBaseline = 'bottom';
          c.fillStyle = col;
          meta.data.forEach((bar, i) => {
            const val = cd.datasets[dsIdx].data[i];
            if (!val) return;
            c.fillText(fmtHistVal(val), bar.x, bar.y - 2);
          });
          c.restore();
        });
      } else {
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data) return;
        const lblColor = isPR ? 'rgba(124,58,237,0.85)' : 'rgba(67,97,238,0.85)';
        c.save();
        c.font = '600 9px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
        c.textAlign = 'center';
        c.textBaseline = 'bottom';
        c.fillStyle = lblColor;
        meta.data.forEach((bar, i) => {
          const val = cd.datasets[0].data[i];
          if (!val) return;
          c.fillText(fmtHistVal(val), bar.x, bar.y - 3);
        });
        c.restore();
      }
    }
  };

  const canvasCtx = document.getElementById('hist-chart').getContext('2d');
  if (histChart) histChart.destroy();
  histChart = new Chart(canvasCtx, {
    type: 'bar',
    plugins: [barLabelsPlugin],
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { top: histShowVals ? 22 : 4 } },
      plugins: {
        legend: { display: histGroupRegion,
          labels: { font: { size: 11 }, boxWidth: 12, padding: 16 } },
        tooltip: { callbacks: { label: ctx => `  ${ctx.dataset.label}: ${fmtHistVal(ctx.raw)}` } },
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 }, color: '#a0a8c0', maxRotation: 45 } },
        y: { position: 'left', grid: { color: 'rgba(0,0,0,0.04)' },
             ticks: { font: { size: 10 }, color: '#6b7494', callback: v => fmtHistVal(v) },
             title: { display: true, text: yLabel, font: { size: 10 }, color: '#6b7494' } }
      }
    }
  });
}

function updateHistStats() {
  const rawData = histMetric === 'bookings' ? HIST_BOOK : HIST_PIPE;
  // Use grouped data so stats match what's shown in the chart
  const data  = groupHistData(getHistData(rawData));
  const vals  = data.map(d => getHistVal(d));
  const total = vals.reduce((a, b) => a + b, 0);
  const periodAvg = Math.round(total / vals.length);
  const maxIdx = vals.indexOf(Math.max(...vals));
  const label  = histMetric === 'bookings' ? 'Bookings' : 'Pipeline';

  // Adapt labels to current grouping
  const periodWord  = histGroupTime === 'quarter' ? 'quarter' : histGroupTime === 'year' ? 'year' : 'month';
  const periodCount = data.length + ' ' + periodWord + (data.length !== 1 ? 's' : '');
  const bestLabel   = histGroupTime === 'quarter' ? 'Best Quarter' :
                      histGroupTime === 'year'    ? 'Best Year'    : 'Best Month';
  const avgLabel    = histGroupTime === 'quarter' ? 'Quarterly Avg' :
                      histGroupTime === 'year'    ? 'Annual Avg'    : 'Monthly Avg';

  document.querySelectorAll('.hist-metric-label').forEach(el => el.textContent = label);
  document.getElementById('hist-stat-total').textContent     = fmtHistVal(total);
  document.getElementById('hist-stat-total-sub').textContent = periodCount + ' · ' + data[0].m + ' – ' + data[data.length-1].m;
  document.getElementById('hist-stat-avg').textContent       = fmtHistVal(periodAvg);
  const avgLabelEl = document.getElementById('hist-stat-avg-label');
  if (avgLabelEl) avgLabelEl.textContent = avgLabel;
  const bestLabelEl = document.getElementById('hist-stat-best-label');
  if (bestLabelEl) bestLabelEl.textContent = bestLabel;
  document.getElementById('hist-stat-best').textContent      = fmtHistVal(vals[maxIdx]);
  document.getElementById('hist-stat-best-sub').textContent  = data[maxIdx].m;
  // Trend — compare last 2 periods vs prior 2 (adapts to grouping)
  const trendEl    = document.getElementById('hist-stat-trend');
  const trendSubEl = document.getElementById('hist-stat-trend-sub');
  const trendN = histGroupTime === 'year' ? 1 : (histGroupTime === 'quarter' ? 2 : 3);
  const trendLabel = histGroupTime === 'year' ? 'Last yr vs prior yr' :
                     histGroupTime === 'quarter' ? 'Last 2 qtrs vs prior 2' : 'Last 3mo vs prior 3mo';
  if (vals.length >= trendN * 2) {
    const lastN = vals.slice(-trendN).reduce((a,b)=>a+b,0)/trendN;
    const prevN = vals.slice(-trendN*2,-trendN).reduce((a,b)=>a+b,0)/trendN;
    if (prevN > 0) {
      const pct = Math.round(((lastN - prevN) / prevN) * 100);
      trendEl.innerHTML    = `<span style="color:${pct>=0?'var(--green)':'var(--red)'}">${pct>=0?'+':''}${pct}%</span>`;
      trendSubEl.textContent = trendLabel;
    } else { trendEl.textContent = '–'; trendSubEl.textContent = 'Prior period is zero'; }
  } else { trendEl.textContent = '–'; trendSubEl.textContent = 'Need more periods'; }
  // Ib/Ob split (always uses raw monthly data for accuracy)
  const rawMonthly = getHistData(rawData);
  const splitEl    = document.getElementById('hist-stat-split');
  const splitSubEl = document.getElementById('hist-stat-split-sub');
  if (histSource === 'all') {
    const ibT = rawMonthly.map(d => histRegion==='all' ? d.ib : (d[histRegion+'_ib']||0)).reduce((a,b)=>a+b,0);
    const obT = rawMonthly.map(d => histRegion==='all' ? d.ob : (d[histRegion+'_ob']||0)).reduce((a,b)=>a+b,0);
    const tot = ibT + obT;
    if (tot > 0) {
      splitEl.textContent    = Math.round(ibT/tot*100) + '% Ib  ·  ' + Math.round(obT/tot*100) + '% Ob';
      splitSubEl.textContent = fmtHistVal(ibT) + ' vs ' + fmtHistVal(obT);
    } else { splitEl.textContent = '–'; splitSubEl.textContent = '–'; }
  } else {
    splitEl.textContent    = histSource === 'ib' ? 'Inbound only' : 'Outbound only';
    splitSubEl.textContent = fmtHistVal(total) + ' filtered total';
  }
}

function syncHistFilterUI() {
  document.querySelectorAll('.hist-metric-btn').forEach(b => {
    b.classList.toggle('active',
      (b.textContent === 'Pipeline' && histMetric === 'pipeline') ||
      (b.textContent === 'Bookings' && histMetric === 'bookings'));

  document.querySelectorAll('#hist-region-pills .pill-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-hr') === histRegion));
  document.querySelectorAll('#hist-source-pills .pill-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-hs') === histSource));
  document.querySelectorAll('#hist-view-pills .pill-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-hv') === histView));

  document.querySelectorAll('#hist-grouptime-pills .pill-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-hgt') === histGroupTime));
  // Split by region toggle
  const splitBtn = document.getElementById('hist-split-region-btn');
  if (splitBtn) {
    splitBtn.classList.toggle('active', histGroupRegion);
    // When region split is on, grey out the region filter row
    const regRow = document.getElementById('hist-region-filter-row');
    if (regRow) regRow.style.opacity = histGroupRegion ? '0.35' : '1';

    // Running avg toggle: hide when region split is on

    // Switch legend

    if (totLeg) totLeg.style.display = histGroupRegion ? 'none' : '';
    if (regLeg) regLeg.style.display = histGroupRegion ? '' : 'none';
  }
  const avgBtn = document.getElementById('hist-avg-toggle');
  if (avgBtn) avgBtn.classList.toggle('active', histShowAvg);
  const valBtn = document.getElementById('hist-val-toggle');
  if (valBtn) valBtn.classList.toggle('active', histShowVals);

    ce.style.display = histDateMode === 'custom' ? 'flex' : 'none';
    document.getElementById('hist-date-start').value = histDateStart;
    document.getElementById('hist-date-end').value   = histDateEnd;
  }
}

function render() {
  const {month:mIdx}=S;
  const regFilter=[...ACTIVE_REGIONS];
  document.getElementById('team-strip').innerHTML=buildTeamStrip(mIdx,regFilter);
  let html='';
  for(const reg of regFilter){
    const visible=REPS.filter(r=>{
      if(r.region!==reg)return false;
      if(r.isLegacyQ1&&mIdx===3)return false;
      if(mIdx===3)return r.types.some(t=>t&&t!=='ramp');
      const ty=r.types[mIdx];if(!ty)return false;
      if(ty==='ramp'){
        const a=r.actuals[mIdx],t=r.targets[mIdx];
        return(a&&(a.demos>0||(a.book!=null&&a.book>0)))||(t&&(t.demos!=null||t.book!=null));
      }
      return true;
    });
    if(!visible.length)continue;
    html+=`<div class="region-heading">${reg}</div><div class="cards-grid">`;
    for(const rep of visible)html+=buildCard(rep,mIdx);
    html+=`</div>`;
    html+=buildLegacyBox(mIdx,reg.toLowerCase());
  }
  document.getElementById('cards-container').innerHTML=html;
}

function setMonth(m,el){
  S.month=m;
  document.querySelectorAll('#month-pills .pill-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  buildWdStatus();
  render();
}
function setRegion(r,el){
  const ALL=['EMEA','APAC','AMER','LATAM'];
  if(r==='global'){
    ACTIVE_REGIONS=new Set(ALL);
    document.querySelectorAll('#region-pills .pill-btn').forEach(b=>b.classList.add('active'));
  } else {
    const isGlobal=ACTIVE_REGIONS.size===ALL.length;
    if(isGlobal){
      // First click after Global: isolate to just this region
      ACTIVE_REGIONS=new Set([r]);
    } else if(ACTIVE_REGIONS.has(r)){
      // Already selected: remove it, but keep at least one
      if(ACTIVE_REGIONS.size>1) ACTIVE_REGIONS.delete(r);
    } else {
      // Not selected: add it
      ACTIVE_REGIONS.add(r);
    }
    const globalBtn=document.querySelector('[data-region="global"]');
    if(globalBtn) globalBtn.classList.toggle('active',ACTIVE_REGIONS.size===ALL.length);
    document.querySelectorAll('#region-pills .pill-btn[data-region]').forEach(b=>{
      if(b.dataset.region!=='global') b.classList.toggle('active',ACTIVE_REGIONS.has(b.dataset.region));
    });
  }
  render();
}

document.getElementById('lu-date').textContent=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
updateMonthPills();
buildWdStatus();
